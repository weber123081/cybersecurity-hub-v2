<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員登入 | 生活資安觀測站</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #111827;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15), transparent 25%);
        }
        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="app" class="w-full max-w-md">
        <div class="glass-panel rounded-3xl p-8 relative overflow-hidden">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-500/20 text-indigo-400 mb-4">
                    <i class="fa-solid fa-shield-halved text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-wide">管理控制中心</h1>
                <p class="text-gray-400 mt-2 text-sm">請輸入高權限管理員憑證以繼續</p>
            </div>

            <form @submit.prevent="login" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">管理員帳號</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-user text-gray-500"></i>
                        </div>
                        <input type="text" id="username" v-model="username" required 
                               class="block w-full pl-10 pr-3 py-3 border border-gray-600 rounded-xl leading-5 bg-gray-800/50 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors sm:text-sm" 
                               placeholder="請輸入帳號">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">存取密碼</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-500"></i>
                        </div>
                        <input type="password" id="password" v-model="password" required 
                               class="block w-full pl-10 pr-3 py-3 border border-gray-600 rounded-xl leading-5 bg-gray-800/50 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors sm:text-sm" 
                               placeholder="請輸入密碼">
                    </div>
                </div>

                <div v-if="errorMessage" class="rounded-xl bg-red-900/50 border border-red-500/50 p-4 flex items-start">
                    <i class="fa-solid fa-circle-exclamation text-red-500 mt-0.5 mr-3"></i>
                    <span class="text-sm text-red-200">{{ errorMessage }}</span>
                </div>

                <button type="submit" :disabled="isLoading" 
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-indigo-500 transition-all disabled:opacity-50">
                    <i v-if="isLoading" class="fa-solid fa-spinner fa-spin mr-2"></i>
                    {{ isLoading ? '驗證中...' : '安全登入' }}
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-xs text-gray-500"><i class="fa-solid fa-lock mr-1"></i>此頁面受 256-bit 加密連線保護</p>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const username = ref('');
                const password = ref('');
                const isLoading = ref(false);
                const errorMessage = ref('');

                const login = async () => {
                    isLoading.value = true;
                    errorMessage.value = '';
                    
                    try {
                        const res = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username.value, password: password.value })
                        });
                        
                        const data = await res.json();
                        
                        if (data.success) {
                            window.location.href = '/admin.html';
                        } else {
                            errorMessage.value = data.message || '登入失敗，請檢查帳號密碼。';
                        }
                    } catch (e) {
                        errorMessage.value = '連線伺服器發生錯誤。';
                    } finally {
                        isLoading.value = false;
                    }
                };

                return { username, password, isLoading, errorMessage, login };
            }
        }).mount('#app');
    </script>
</body>
</html>
